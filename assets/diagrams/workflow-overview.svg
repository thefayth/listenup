  <g transform="translate(80 500)">
    <rect width="1020" height="82" rx="16" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="28" y="34" fill="#0f9f6e" font-family="Arial, sans-serif" font-size="18" font-weight="800">Safety posture</text>
    <text x="28" y="62" fill="#667085" font-family="Arial, sans-serif" font-size="17">Signed-in media processing, guided social handoff, private transcript data, and public documentation only.</text>
  </g>
