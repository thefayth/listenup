    <text x="878" y="350" fill="#101828">TXT / SRT / VTT</text>
  </g>
  <g stroke="#2454ff" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M250 219 H300"/>
    <path d="M495 162 C535 162 535 219 560 219"/>
    <path d="M495 252 H560"/>
    <path d="M495 342 C535 342 535 219 560 219"/>
    <path d="M770 219 C805 219 805 142 830 142"/>
    <path d="M770 219 H830"/>
    <path d="M770 219 C805 219 805 342 830 342"/>
