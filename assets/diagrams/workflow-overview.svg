  <text x="70" y="112" fill="#667085" font-family="Arial, sans-serif" font-size="18">Owned media and captions move through a focused Studio Console into review, history, and export.</text>
  <g font-family="Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="70" y="180" width="180" height="78" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
