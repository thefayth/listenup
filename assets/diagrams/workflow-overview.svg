    <rect x="310" y="130" width="185" height="64" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="342" y="170" fill="#101828">Upload media</text>
    <rect x="310" y="220" width="185" height="64" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
