    <rect x="830" y="110" width="220" height="64" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="868" y="150" fill="#101828">Editable transcript</text>
    <rect x="830" y="210" width="220" height="64" rx="14" fill="#ffffff" stroke="#d9e1ec"/>
    <text x="875" y="250" fill="#101828">Saved history</text>
